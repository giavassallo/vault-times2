{% extends 'base.html' %}
{% block title %}Delete Article | Vault Times{% endblock %}

{% block content %}
<div class="card-vault">
  <h2 class="glow">Delete Article</h2>
  <p>Delete <strong>{{ article.title }}</strong>?</p>
  <p style="color: var(--danger);">
  This action cannot be undone.
  </p>
  <form method="post">
    {% csrf_token %}
    <button class="btn-vault" type="submit">Yes, delete</button>
    <a class="btn-vault" href="{% url 'article-detail' article.pk %}">Cancel</a>
  </form>
</div>
{% endblock %}
